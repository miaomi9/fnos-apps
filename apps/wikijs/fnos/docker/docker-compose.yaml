services:
  postgres:
    image: ${DOCKER_MIRROR}docker.io/library/postgres:16-alpine
    container_name: wikijs-db
    environment:
      - POSTGRES_USER=wikijs
      - POSTGRES_PASSWORD=wikijs
      - POSTGRES_DB=wikijs
    volumes:
      - ${TRIM_PKGVAR}/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  wikijs:
    image: ${DOCKER_MIRROR}ghcr.io/requarks/wiki:${VERSION}
    container_name: wikijs
    depends_on:
      - postgres
    ports:
      - "${TRIM_SERVICE_PORT}:3000"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=wikijs
      - DB_PASS=wikijs
      - DB_NAME=wikijs
      - TZ=Asia/Shanghai
    restart: unless-stopped
