services:
  postgres:
    image: ${DOCKER_MIRROR}docker.io/library/postgres:16-alpine
    container_name: miniflux-db
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=miniflux
      - POSTGRES_DB=miniflux
    volumes:
      - ${TRIM_PKGVAR}/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  miniflux:
    image: ${DOCKER_MIRROR}docker.io/miniflux/miniflux:${VERSION}
    container_name: miniflux
    depends_on:
      - postgres
    ports:
      - "${TRIM_SERVICE_PORT}:8080"
    environment:
      - DATABASE_URL=postgres://miniflux:miniflux@postgres/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - TZ=Asia/Shanghai
    restart: unless-stopped
