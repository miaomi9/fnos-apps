log:
  level: info

plugins:
  - tag: main_sequence
    type: sequence
    args:
      - matches:
          - qname &./cn_domains.txt
        exec: $forward_cn
      - exec: $forward_global

  - tag: forward_cn
    type: forward
    args:
      upstreams:
        - addr: 223.5.5.5
        - addr: 119.29.29.29
        - addr: 114.114.114.114

  - tag: forward_global
    type: forward
    args:
      upstreams:
        - addr: https://1.1.1.1/dns-query
        - addr: https://8.8.8.8/dns-query

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: 0.0.0.0:5353

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: 0.0.0.0:5353
