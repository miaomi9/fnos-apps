services:
  postgres:
    image: ${DOCKER_MIRROR}docker.io/library/postgres:16-alpine
    container_name: linkwarden-db
    environment:
      - POSTGRES_USER=linkwarden
      - POSTGRES_PASSWORD=linkwarden
      - POSTGRES_DB=linkwarden
    volumes:
      - ${TRIM_PKGVAR}/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  linkwarden:
    image: ${DOCKER_MIRROR}ghcr.io/linkwarden/linkwarden:${VERSION}
    container_name: linkwarden
    depends_on:
      - postgres
    ports:
      - "${TRIM_SERVICE_PORT}:3000"
    environment:
      - DATABASE_URL=postgresql://linkwarden:linkwarden@postgres:5432/linkwarden
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:${TRIM_SERVICE_PORT}
      - TZ=Asia/Shanghai
    volumes:
      - ${TRIM_PKGVAR}/data:/data/data
    restart: unless-stopped
